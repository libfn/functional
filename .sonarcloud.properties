# SonarCloud Automatic Analysis configuration.
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis
#
# Automatic Analysis (the GitHub App, no CI workflow) reads only this file and
# only a subset of properties from it; sonar-project.properties is ignored.
# --- Sources / tests ---
sonar.sources=include,examples
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# --- Path exclusions ---
# Local CMake build directories and FetchContent-pulled deps are out of scope.
sonar.exclusions=.build*/**,**/_deps/**

# --- Duplicated code (CPD) ---
# The test suite intentionally repeats assertion shapes parameterised over
# value categories, constexpr/runtime evaluation, and the noexcept profile
# (potentially-throwing vs nothrow) of the user's special member functions,
# so don't count them toward the duplications metric.
sonar.cpd.exclusions=tests/**
