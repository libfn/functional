sonar.organization=libfn
sonar.projectKey=libfn_functional

sonar.sources=include,examples
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Use compilation database for accurate C++ analysis
sonar.cfamily.compile-commands=.build/compile_commands.json

# Exclusions
sonar.exclusions=.build*/**,**/_deps/**
sonar.cpd.exclusions=tests/**

# C++ specific: be more lenient with template-heavy code
sonar.cpd.cpp.minimumTokens=200
