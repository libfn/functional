# SonarCloud project configuration
# https://docs.sonarsource.com/sonarcloud/
#
# This project currently uses SonarCloud's Automatic Analysis (the GitHub App,
# no CI workflow). Automatic Analysis does NOT support C/C++ analysis; only
# the non-C/C++ files in this repository (YAML, Markdown, shell, CMake, etc.)
# are scanned. Settings consumed by the CI-only sonar-scanner (e.g.
# sonar.cfamily.compile-commands, sonar.coverageReportPaths) are intentionally
# omitted here and will be added together with the GitHub Actions workflow
# that runs sonar-scanner.

# --- Project metadata ---
sonar.projectKey=libfn_functional
sonar.organization=libfn
sonar.projectName=Extending C++ library for functional programming
sonar.projectVersion=0.0.1

# --- Sources / tests ---
sonar.sources=include,examples
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# --- Path exclusions ---
# Local CMake build directories and FetchContent-pulled deps are out of scope.
sonar.exclusions=.build*/**,**/_deps/**

# --- Duplicated code (CPD) ---
# The test suite intentionally repeats assertion shapes parameterised over
# value categories, constexpr/runtime evaluation, and the noexcept profile
# (potentially-throwing vs nothrow) of the user's special member functions,
# so don't count them toward the duplications metric.
sonar.cpd.exclusions=tests/**
