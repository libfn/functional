# sonar.organization/projectKey come from the sonarcloud workflows.
sonar.host.url=https://sonarcloud.io

sonar.sources=include,examples
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=.build*/**,**/_deps/**

# Disable SonarQube CPD (Copy-Paste Detection) entirely.
#
# This is a heavily templated library where repetitive code patterns
# are intentional and part of the design:
# - include/**: overloads for different qualifiers, constraints, and value categories
# - tests/**: repetitive patterns used for exhaustive coverage
#
# CPD produces mostly false positives for this codebase. Since `sonar.cpd.skip=true`
# does not work for C++ code, we use `sonar.cpd.exclusions=**/*` to effectively disable it.
sonar.cpd.exclusions=**/*

# Suppress selected SonarCloud issues (scope + rationale per entry):
sonar.issue.ignore.multicriteria=e1,e2

# e1 — cpp:S5145 (tainted input reaching an output sink), examples only: the demos read
# input and print it back, which is the point of a demo, not an injection surface.
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S5145
sonar.issue.ignore.multicriteria.e1.resourceKey=examples/**/*

# e2 — cpp:S3659 (alternative operator tokens such as `not`), project-wide: deliberate
# readability choice — `not ` (with the trailing space) is harder to overlook than `!`.
sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S3659
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*
