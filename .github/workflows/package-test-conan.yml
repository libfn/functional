name: package-test-conan

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/package-test-conan.yml'
      - 'conanfile.py'
      - 'test_package/**'
      - 'include/**'
      - 'VERSION'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/package-test-conan.yml'
      - 'conanfile.py'
      - 'test_package/**'
      - 'include/**'
      - 'VERSION'
  workflow_dispatch:

jobs:
  test_conan:
    runs-on:
      group: runners-intel
    container: libfn.azurecr.io/ci-build-gcc:15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cxx23
            options: '-o "&:disable_cxx23=False" -s "compiler.cppstd=23"'
          - name: cxx20
            options: '-o "&:disable_cxx23=True" -s "compiler.cppstd=20"'
          - name: cxx20-std23
            options: '-o "&:disable_cxx23=True" -s "compiler.cppstd=23"'

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Detect Conan profile
      run: |
        conan profile detect
        echo "tools.cmake.cmaketoolchain:generator=Ninja" >> ~/.conan2/global.conf

    - name: Test ${{ matrix.name }} packaging
      run: conan create . --build=missing ${{ matrix.options }}
