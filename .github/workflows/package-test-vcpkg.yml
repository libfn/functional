name: package-test-vcpkg

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/package-test-vcpkg.yml'
      - 'ports/**'
      - 'test_package/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'VERSION'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/package-test-vcpkg.yml'
      - 'ports/**'
      - 'test_package/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'VERSION'
  workflow_dispatch:

jobs:
  test_vcpkg:
    runs-on: ${{ github.repository == 'libfn/functional' && 'warp-ubuntu-latest-x64-4x' || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install libfn
      env:
        VCPKG_LIBFN_SOURCE_PATH: ${{ github.workspace }}
      run: |
        "$VCPKG_INSTALLATION_ROOT/vcpkg" install libfn \
          --overlay-ports=ports \
          --triplet x64-linux

    - name: Configure and build
      run: |
        cmake -B .build test_package \
          "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=x64-linux
        cmake --build .build

    - name: Run main
      run: .build/main
