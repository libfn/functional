name: sonarcloud-pr-scan

# Runs after `sonarcloud.yml` completes on a pull_request event. Because this workflow is triggered by
# `workflow_run`, it executes in the context of the base repository's default branch and has access to
# repository secrets, including SONAR_TOKEN. This allows us to analyse pull requests opened from forks,
# which otherwise do not receive secrets.
#
# The pull request head SHA is read from the artifact (written there by the triggering workflow from
# `github.event.pull_request.head.sha`) and used as the single source of truth for both the source
# checkout and the SonarCloud revision. Inside this workflow, `github.event.workflow_run.head_sha`
# is not suitable for either purpose because for `pull_request` events it is the synthetic merge commit
# SHA (`refs/pull/N/merge` rather than `refs/pull/N/head`), which is unreachable on the head branch
# and so is unsuitable for SCM status updates or PR decoration.

on:
  workflow_run:
    workflows: ["sonarcloud"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  scan:
    if: >
      github.repository == 'libfn/functional' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: warp-ubuntu-latest-x64-4x
    container: libfn.azurecr.io/ci-build-gcc:15-sha-08b1133

    steps:
    # Download the artifact outside the workspace so the subsequent checkout does not wipe it.
    - name: Download SonarCloud inputs artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: sonarcloud-pr-inputs
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}
        path: ${{ runner.temp }}/sonar-artifact

    # Check out the base repository to obtain the local action, before it checks out the PR head itself.
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        sparse-checkout: .github

    - name: Restore pull request workspace
      id: pr
      uses: ./.github/actions/restore-pr-workspace
      with:
        archive: ${{ runner.temp }}/sonar-artifact/sonar-inputs.tar.gz

    - name: Run SonarScanner
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: >
          -Dsonar.cfamily.gcov.reportsPath=.build
          -Dsonar.cfamily.compile-commands=.build/compile_commands.json
          -Dsonar.scm.revision=${{ steps.pr.outputs.head_sha }}
          -Dsonar.pullrequest.key=${{ steps.pr.outputs.number }}
          -Dsonar.pullrequest.branch=${{ steps.pr.outputs.head_ref }}
          -Dsonar.pullrequest.base=${{ steps.pr.outputs.base_ref }}
