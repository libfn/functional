name: licence

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/licence.yml'
      - 'include/**'
      - 'tests/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.fossa.yml'
      - 'LICENSE.md'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/licence.yml'
      - 'include/**'
      - 'tests/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.fossa.yml'
      - 'LICENSE.md'
  workflow_dispatch:
    inputs:
      run_licence_check:
        description: "Run FOSSA licence check"
        required: true
        default: true
        type: boolean

jobs:
  licence-check:
    if: ${{ github.event_name == 'push' || inputs.run_licence_check }}
    runs-on:
      group: runners-arm64
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3 # v1.9.0
      with:
        api-key: ${{ secrets.FOSSA_API_KEY }}

  licence-unchanged:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on:
      group: runners-arm64
    env:
      LICENCE_FILE: LICENSE.md
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        sparse-checkout: .
        fetch-depth: 0

    - name: Compare licence file
      id: assert
      run:
        git diff --exit-code origin/${{ github.base_ref }} -- "${LICENCE_FILE}"

    - name: What happened?
      if: failure() && steps.assert.outcome == 'failure'
      run:
        echo "Your pull request appear to have attempted to modify ${LICENCE_FILE}"
        echo "If you want your name added to ${LICENCE_FILE}, please ask project maintainers."
        exit 1
