name: sonarcloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    runs-on:
      group: runners-intel
    container: libfn.azurecr.io/ci-build-gcc:15
    strategy:
      fail-fast: false
    env:
      CC: /usr/local/bin/gcc
      CXX: /usr/local/bin/g++
      GCOV: /usr/local/bin/gcov

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for blame info

    - name: Build with coverage instrumentation and compilation database
      shell: bash
      env:
        CMAKE_GENERATOR: Ninja
        CMAKE_BUILD_TYPE: Debug
      run: |
        mkdir .build
        cd .build
        cmake -DCOVERAGE=ON ..
        COMPILER=$( grep -iE "^CMAKE_CXX_COMPILER:FILEPATH=" CMakeCache.txt | sed -n 's/^[^=]*=//p' )
        FLAGS=$( grep -iE "^CMAKE_CXX_FLAGS(_${{ env.CMAKE_BUILD_TYPE }})?:STRING" CMakeCache.txt | sed -n 's/^[^=]*=//p' | tr '\n' ' ' )
        printf "C++ compiler path: %s\n" "$COMPILER"
        $COMPILER --version
        printf "C++ compilation options: %s\n" "$FLAGS"
        printf "gcov version: %s\n" "$( $GCOV --version | head -1 )"
        cmake --build . --target tests -- -j$(nproc)

    - name: Generate coverage data with gcov
      run: |
        cd .build
        ctest -L 'tests_(p?fn)' -j1 # generate .gcda files
        $GCOV -pbc -r -s $(realpath ..) $(find tests -type f -name '*.gcno') # generate .gcov files

    - name: Run SonarScanner
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
