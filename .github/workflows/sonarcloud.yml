name: sonarcloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    runs-on:
      group: runners-intel
    container: libfn.azurecr.io/ci-build-gcc:15
    env:
      CC: /usr/local/bin/gcc
      CXX: /usr/local/bin/g++
      GCOV: /usr/local/bin/gcov

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0  # Full history for blame info

    - name: Build with coverage instrumentation and compilation database
      shell: bash
      env:
        CMAKE_GENERATOR: Ninja
        CMAKE_BUILD_TYPE: Debug
      run: |
        mkdir .build
        cd .build
        cmake -DLIBFN_COVERAGE=ON ..
        COMPILER=$( grep -iE "^CMAKE_CXX_COMPILER:FILEPATH=" CMakeCache.txt | sed -n 's/^[^=]*=//p' )
        printf "C++ compiler path: %s\n" "$COMPILER"
        $COMPILER --version
        printf "gcov version: %s\n" "$( $GCOV --version | head -1 )"
        cmake --build . --target tests -- -j"$(nproc)"

    - name: Generate coverage data with gcov
      run: |
        cd .build
        ctest -L 'tests_(p?fn)' -j1 # generate .gcda files
        # shellcheck disable=SC2046  # find emits one path per result; intentional word-splitting into gcov arg list
        $GCOV -pbc -r -s "$(realpath ..)" $(find tests -type f -name '*.gcno') # generate .gcov files

    # Pull requests opened from forks do not receive repository secrets, so
    # the SonarScanner cannot run here. For those events, package the build
    # outputs and PR metadata into an artifact and hand off to the companion
    # `sonarcloud-pr-scan` workflow (triggered via `workflow_run`), which
    # runs in the base repository context and has access to SONAR_TOKEN.
    - name: Run SonarScanner
      if: github.event_name != 'pull_request'
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: >
          -Dsonar.cfamily.gcov.reportsPath=.build
          -Dsonar.cfamily.compile-commands=.build/compile_commands.json

    - name: Package SonarCloud inputs for downstream analysis
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        mkdir -p .sonar-pr
        printf "%s\n" "$PR_NUMBER"   > .sonar-pr/number
        printf "%s\n" "$PR_HEAD_SHA" > .sonar-pr/head_sha
        printf "%s\n" "$PR_HEAD_REF" > .sonar-pr/head_ref
        printf "%s\n" "$PR_BASE_REF" > .sonar-pr/base_ref
        # shellcheck disable=SC2046  # find emits one path per result; intentional word-splitting into tar arg list
        tar -czf sonar-inputs.tar.gz \
          .build/compile_commands.json \
          $(find .build -name '*.gcov' -print) \
          .sonar-pr

    - name: Upload SonarCloud inputs (pull requests only)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: sonarcloud-pr-inputs
        path: sonar-inputs.tar.gz
        retention-days: 1
        if-no-files-found: error
